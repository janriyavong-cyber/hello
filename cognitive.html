<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL_COGNITIVE_V2</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0d0208;
            --card-bg: #151515;
            --error-red: #ff3131;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }

        /* Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal-container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            z-index: 5;
        }

        header { margin-bottom: 20px; font-size: 0.8rem; letter-spacing: 1px; }

        /* โจทย์อยู่ด้านบนการ์ด */
        #q-text {
            font-size: 1.4rem;
            margin-bottom: 25px;
            min-height: 60px;
            text-shadow: 0 0 5px var(--neon-green);
        }

        .card-zone {
            position: relative;
            height: 300px;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border: 1px solid var(--neon-green);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            position: absolute;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        /* ช้อยส์ซ้าย-ขวา ภายในตัวการ์ด */
        .choice-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            align-items: center;
            gap: 20px;
        }

        .choice-box {
            flex: 1;
            font-size: 0.9rem;
            line-height: 1.4;
            opacity: 0.9;
        }

        .divider {
            width: 1px;
            height: 50%;
            background: rgba(0, 255, 65, 0.3);
        }

        #result-screen {
            display: none;
            border: 1px solid var(--neon-green);
            padding: 30px;
            background: var(--card-bg);
        }

        .stack-item {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 20px 0;
            letter-spacing: 5px;
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 20px;
            font-family: inherit;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: var(--neon-green); color: black; }
    </style>
</head>
<body>

<div class="terminal-container">
    <header>
        <p> [ SYSTEM_ANALYSIS_STRICT_MODE ] </p>
        <hr>
    </header>

    <div id="quiz-area">
        <div id="q-text">INITIALIZING...</div>
        
        <div class="card-zone">
            <div id="question-card" class="card">
                <div class="choice-container">
                    <div id="opt-a" class="choice-box"></div>
                    <div class="divider"></div>
                    <div id="opt-b" class="choice-box"></div>
                </div>
            </div>
        </div>
        <p style="font-size: 0.7rem; margin-top: 20px; opacity: 0.6;"> < SWIPE LEFT FOR A | SWIPE RIGHT FOR B > </p>
    </div>

    <div id="result-screen">
        <p>REPORT_ID: #7721-BRAIN</p>
        <p>IDENTIFIED_COGNITIVE_STACK:</p>
        <div id="final-stack" class="stack-item" style="color: #fff; text-shadow: 0 0 10px var(--neon-green);"></div>
        <p style="font-size: 0.8rem; border-top: 1px dashed var(--neon-green); padding-top: 10px;">
            ผลลัพธ์นี้ประมวลผลจากลำดับการรับข้อมูลและการตัดสินใจของคุณ
        </p>
        <button onclick="location.reload()">RE-RUN DIAGNOSTIC</button>
    </div>
</div>

<script>
    const questions = [
        { 
            q: "เมื่อต้องรับมือกับโปรเจกต์ใหม่ๆ...", 
            a: "ชอบสำรวจความเป็นไปได้ที่หลากหลาย เชื่อมโยงไอเดียใหม่ๆ ไปเรื่อย", 
            b: "มองเห็นปลายทางที่ชัดเจนเพียงอย่างเดียว และมุ่งเน้นไปยังภาพนั้น", 
            typeA: "Ne", typeB: "Ni" 
        },
        { 
            q: "เวลาที่คุณต้องตัดสินใจ...", 
            a: "ยึดตามหลักการที่ตัวเองวิเคราะห์แล้วว่ามันสมเหตุสมผลที่สุด", 
            b: "ยึดตามระบบที่มีประสิทธิภาพและมาตรฐานที่คนส่วนใหญ่ยอมรับ", 
            typeA: "Ti", typeB: "Te" 
        },
        { 
            q: "เวลาที่อยู่ร่วมกับผู้อื่น...", 
            a: "ให้ความสำคัญกับความรู้สึกของคนรอบข้างและบรรยากาศโดยรวม", 
            b: "ให้ความสำคัญกับความรู้สึกและความถูกต้องตามค่านิยมของตัวเอง", 
            typeA: "Fe", typeB: "Fi" 
        },
        { 
            q: "วิธีที่คุณเก็บข้อมูลจากโลกความจริง...", 
            a: "เน้นการสัมผัสประสบการณ์สดๆ ตรงหน้า ชอบอะไรที่ตื่นเต้นและฉับพลัน", 
            b: "เน้นการเปรียบเทียบกับสิ่งที่เคยเกิดขึ้น รายละเอียดในอดีตที่คุ้นเคย", 
            typeA: "Se", typeB: "Si" 
        }
    ];

    let currentIdx = 0;
    let userStack = [];
    let startX = 0;
    let isDragging = false;
    const card = document.getElementById('question-card');

    function updateUI() {
        if (currentIdx < questions.length) {
            document.getElementById('q-text').innerText = questions[currentIdx].q;
            document.getElementById('opt-a').innerText = questions[currentIdx].a;
            document.getElementById('opt-b').innerText = questions[currentIdx].b;
        } else {
            showResults();
        }
    }

    card.addEventListener('pointerdown', (e) => {
        isDragging = true;
        startX = e.clientX;
        card.style.transition = 'none';
        card.setPointerCapture(e.pointerId);
    });

    card.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        let moveX = e.clientX - startX;
        card.style.transform = `translateX(${moveX}px) rotate(${moveX/20}deg)`;
        
        // Visual feedback เฉยๆ ไม่โชว์ชื่อฟังก์ชัน
        if(moveX < -50) card.style.borderColor = "#fff"; 
        else if(moveX > 50) card.style.borderColor = "#fff";
        else card.style.borderColor = "var(--neon-green)";
    });

    card.addEventListener('pointerup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        let diffX = e.clientX - startX;

        if (Math.abs(diffX) > 100) {
            let choice = diffX < 0 ? questions[currentIdx].typeA : questions[currentIdx].typeB;
            userStack.push(choice);
            
            card.style.transition = '0.4s';
            card.style.transform = `translateX(${diffX > 0 ? 1000 : -1000}px) rotate(${diffX/10}deg)`;
            
            setTimeout(() => {
                currentIdx++;
                resetCard();
                updateUI();
            }, 200);
        } else {
            resetCard();
        }
    });

    function resetCard() {
        card.style.transition = '0.3s ease-out';
        card.style.transform = 'translateX(0px) rotate(0deg)';
        card.style.borderColor = "var(--neon-green)";
    }

    function showResults() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-stack').innerText = userStack.join(' - ');
    }

    updateUI();
</script>

</body>
</html>
