<!DOCTYPE html>
<html lang="th">
<head>
    <style>
        /* สไตล์กระดาษ */
        body {
            background-color: #e3dcd1; /* โทนสีกระดาษเก่า */
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace; /* ฟอนต์เนิร์ดๆ */
        }

        /* แถบด้านซ้าย */
        .sidebar {
            width: 250px;
            background-color: #d6cfc4;
            border-right: 2px solid #8b8374;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* รูปโปรไฟล์สไตล์ Irasutoya (ใส่กรอบแบบเรียบง่าย) */
        .profile-img {
            width: 150px;
            height: 150px;
            background-color: #fff;
            border: 3px solid #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* เพิ่มเงาให้ดูเหมือนแปะกระดาษ */
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        /* พื้นที่เนื้อหาหลัก */
        .main-content {
            flex: 1;
            padding: 40px;
            color: #2c2c2c;
        }

        h1 { border-bottom: 2px solid #333; display: inline-block; }
        
        .terminal-text {
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-left: 5px solid #333;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="profile-img">
            <img src="YOUR_IMAGE_LINK" alt="Profile" style="width:100%;">
        </div>
        <h3>Character Archive</h3>
        <p>Status: <b>Exhausted</b></p>
    </div>

    <div class="main-content">
        <h1>Subject: Tensei/Ricard</h1>
        <div class="terminal-text">
            <p>> Loading Multiverse Data...</p>
            <p>> Style: Geometric / Flat</p>
            <p>> Condition: Critical Stress Level</p>
        </div>
        <p>รายละเอียดตัวละครต่างๆ จะถูกเก็บไว้ที่นี่ในรูปแบบสมุดบันทึก...</p>
    </div>

</body>
</html>
