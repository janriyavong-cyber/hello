<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Slot Machine</title>
    <style>
        /* CSS: ตกแต่งหน้าตา */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #2c3e50, #000000);
            font-family: 'Kanit', sans-serif;
            color: white;
        }

        .slot-container {
            background: linear-gradient(145deg, #f1c40f, #d4ac0d);
            padding: 40px;
            border-radius: 30px;
            border: 10px solid #f39c12;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }

        h1 {
            margin-top: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            color: #fff;
        }

        .reels {
            display: flex;
            gap: 15px;
            background: #34495e;
            padding: 20px;
            border-radius: 15px;
            border: 5px solid #2c3e50;
            margin-bottom: 30px;
        }

        .reel {
            width: 90px;
            height: 120px;
            background: white;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            color: #333;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        /* Animation สั่นตอนหมุน */
        .spinning {
            animation: blur 0.1s infinite;
        }

        @keyframes blur {
            0% { transform: translateY(-5px); filter: blur(2px); }
            50% { transform: translateY(5px); filter: blur(2px); }
            100% { transform: translateY(-5px); filter: blur(2px); }
        }

        button {
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 8px 0 #c0392b;
            transition: all 0.1s;
            width: 100%;
        }

        button:hover {
            background: #ff5e4d;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c0392b;
        }

        button:disabled {
            background: #95a5a6;
            box-shadow: 0 4px 0 #7f8c8d;
            cursor: not-allowed;
        }

        #result {
            margin-top: 25px;
            font-size: 1.5rem;
            min-height: 1.5em;
            font-weight: bold;
        }

        .win {
            color: #2ecc71;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
            animation: bounce 0.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="slot-container">
        <h1>LUCKY SLOT</h1>
        
        <div class="reels">
            <div class="reel" id="reel1">7</div>
            <div class="reel" id="reel2">7</div>
            <div class="reel" id="reel3">7</div>
        </div>

        <button id="spinBtn" onclick="spin()">SPIN!</button>
        
        <div id="result">กดปุ่มเพื่อเริ่มสุ่ม!</div>
    </div>

    <script>
        // JavaScript: ควบคุมการทำงาน
        const symbols = ['🍎', '🍋', '🍒', '🔔', '💎', '7️⃣', '⭐'];
        const spinBtn = document.getElementById('spinBtn');
        const resultText = document.getElementById('result');
        const reels = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];

        function spin() {
            // ปิดปุ่ม และล้างข้อความเก่า
            spinBtn.disabled = true;
            resultText.innerText = "กำลังหมุน...";
            resultText.classList.remove('win');

            // เริ่มใส่อนิเมชั่นสั่น
            reels.forEach(reel => reel.classList.add('spinning'));

            let duration = 2000; // เวลาหมุน 2 วินาที
            
            // สุ่มเปลี่ยนสัญลักษณ์ไปเรื่อยๆ (Visual Effect)
            const effectInterval = setInterval(() => {
                reels.forEach(reel => {
                    reel.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                });
            }, 100);

            // หยุดหมุน
            setTimeout(() => {
                clearInterval(effectInterval);
                
                // สุ่มผลลัพธ์จริง
                const finalResults = [
                    symbols[Math.floor(Math.random() * symbols.length)],
                    symbols[Math.floor(Math.random() * symbols.length)],
                    symbols[Math.floor(Math.random() * symbols.length)]
                ];

                // แสดงผลลัพธ์และหยุด Animation
                reels.forEach((reel, index) => {
                    reel.classList.remove('spinning');
                    reel.innerText = finalResults[index];
                });

                checkWin(finalResults);
                spinBtn.disabled = false;
            }, duration);
        }

        function checkWin(results) {
            const [v1, v2, v3] = results;

            if (v1 === v2 && v2 === v3) {
                resultText.innerText = "🎊 JACKPOT! 🎊";
                resultText.classList.add('win');
            } else if (v1 === v2 || v2 === v3 || v1 === v3) {
                resultText.innerText = "เกือบแล้ว! ได้คู่!";
            } else {
                resultText.innerText = "ดวงไม่ดีเลย ลองใหม่นะ";
            }
        }
    </script>
</body>
</html>
